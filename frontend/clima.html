<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima</title>
    <link rel="stylesheet" href="style1.css">
</head>

<body>

<header>
    <h1>Clima</h1>
</header>

<div class="layout">

    <nav>
        <ul>
            <a href="index.html"><li>Daily</li></a>
            <a href="clima.html"><li>Clima</li></a>
        </ul>
    </nav>

    <!-- CONTEÚDO -->
    <main>

        <div class="caixa-maior">
            <input class="input-cidade" placeholder="Digite o nome da cidade">
            <button class="botao-busca" onclick="cliqueiNoBotao()">
                <img class="img-busca" src="https://www.svgrepo.com/show/391956/find-glass-magnifier-search.svg">
            </button>

            <div class="caixa-media">
                <h2 class="cidade">Tempo em São Paulo</h2>
                <p class="temp">21º C</p>

                <div class="caixa-menor">
                    <img class="img-previsao" src="https://openweathermap.org/img/wn/04n.png">
                    <p class="texto-previsao">Nublado</p>
                </div>

                <p class="umidade">Umidade: 70%</p>
            </div>
        </div>

        <div class="historico">
            <h3>Histórico</h3>
            <div class="cards" id="historico"></div>
        </div>

    </main>

</div>

<script src="script1.js"></script>

</body>
</html>
